image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
stages:
  - check
  - mirror

checks:
  stage: check
  script:
    - uv run poe checks
    - uv run poe notebook
    - uv run pytest --junitxml=junit.xml
    - uv run poe cover
    - uv run coverage xml
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

mirror:
  stage: mirror
  script:
    - git push --mirror git@github.com:engineering-with-ai/electrical-dc-bus-protection.git
  only:
    - main
